    <!-- Eliminate white-screen flash: show a branded spinner the instant HTML is parsed -->
    <style>
      html,
      body {
        margin: 0;
        background: #f5f2f8;
      }
      /* Pulse animation for the logo */
      #cl-initial-loader {
        display: none; /* hidden by default, shown when #root is empty */
      }
      #root:empty ~ #cl-initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        inset: 0;
        background: #f5f2f8;
        z-index: 9999;
      }
      #cl-initial-loader img {
        width: 120px; /* Adjust based on your logo's ideal initial size */
        height: auto;
        animation: _cl-pulse 1.5s ease-in-out infinite alternate;
      }
      @keyframes _cl-pulse {
        0% {
          transform: scale(0.95);
          opacity: 0.7;
        }
        100% {
          transform: scale(1.05);
          opacity: 1;
        }
      }
    </style>

        alt="collabiora Loading..."
